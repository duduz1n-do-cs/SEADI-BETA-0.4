<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEADI - Login Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../PI/css/estilos (1).css">
</head>
<body>

    <div class="ambient-light"></div>

    <main class="main-wrapper">
        <div class="login-card">
            <header class="card-header">
                <img src="img/seadi_1.png" alt="Logo SEADI" class="main-logo">
                <div class="brand-info">
                    <p class="tagline">Educação Digital Inteligente</p>
                    <h1 class="title">Portal do Aluno</h1>
                </div>
            </header>

            <form class="login-form">
                <div class="input-group">
                    <input type="email" placeholder="E-mail de cadastro" required>
                </div>
                
                <div class="input-group">
                    <input type="password" placeholder="Senha" required>
                </div>

                <button type="submit" class="btn-login">
                    <span>ENTRAR</span>
                </button>
            </form>

            <div class="card-footer">
                <div class="divider">
                    <span>OU</span>
                </div>
                <a href="../PI/esqueci-senha.html" class="forgot-password">Esqueceu sua senha?</a>
            </div>
        </div>

        <div class="signup-box">
            <p>Não possui uma conta? <a href="../PI/criarconta.html">Cadastre-se agora</a></p>
        </div>
    </main>

</body>
</html>
